<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recargas Games | Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap');
        
        body { 
            background-color: #05070a; 
            color: #e2e8f0; 
            font-family: 'Rajdhani', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .header-font { font-family: 'Orbitron', sans-serif; }
        .game-card {
            background: linear-gradient(145deg, #0f121a, #161b26);
            border: 1px solid #1e293b;
            transition: 0.3s;
        }
        .btn-action {
            background: linear-gradient(90deg, #1d4ed8, #3b82f6);
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
        }
        .tab-btn { border-bottom: 2px solid transparent; transition: 0.3s; cursor: pointer; padding-bottom: 8px; }
        .tab-btn.active { border-color: #3b82f6; color: #3b82f6; }
        
        .input-field {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: 15px;
            width: 100%;
            color: white;
            outline: none;
            font-weight: bold;
        }
        .input-field:focus { border-color: #3b82f6; background: rgba(255,255,255,0.08); }

        .pago-desplegable {
            display: none;
            background: #0a0d14;
            border: 1px solid #3b82f6;
            border-radius: 25px;
            padding: 25px;
            margin-top: 25px;
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-[#05070a]/90 border-b border-white/5 backdrop-blur-md px-6 py-4 flex justify-between items-center">
        <h1 class="header-font text-xl font-black italic tracking-tighter text-white">RECARGAS<span class="text-blue-500">GAMES</span></h1>
        <div id="user-area">
            <button onclick="toggleAuthModal()" class="text-[10px] font-bold border border-blue-500/50 px-4 py-2 rounded-full text-white uppercase tracking-widest">
                <i class="fas fa-user-circle mr-2"></i>Cuenta
            </button>
        </div>
    </nav>

    <div class="flex overflow-x-auto gap-8 px-6 py-4 bg-[#0a0d14] no-scrollbar border-b border-white/5">
        <button onclick="cambiarCategoria('Free Fire', this)" class="tab-btn active flex-none font-bold text-sm uppercase">Free Fire</button>
        <button onclick="cambiarCategoria('Block Strike', this)" class="tab-btn flex-none font-bold text-sm uppercase text-gray-600">Block Strike</button>
        <button onclick="cambiarCategoria('Roblox', this)" class="tab-btn flex-none font-bold text-sm uppercase text-gray-600">Roblox</button>
        <button onclick="cambiarCategoria('Netflix', this)" class="tab-btn flex-none font-bold text-sm uppercase text-gray-600">Netflix</button>
    </div>

    <main class="max-w-2xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8 p-4 bg-blue-500/5 border border-blue-500/20 rounded-2xl">
            <span class="text-xs font-bold uppercase text-blue-400 tracking-widest">Tasa de Cambio</span>
            <span class="header-font font-black text-blue-500 text-lg">650,00 BS</span>
        </div>

        <div id="grid-productos" class="grid grid-cols-1 gap-4"></div>

        <div id="seccion-pago" class="pago-desplegable">
            <div class="text-center mb-6">
                <h2 class="header-font text-blue-500 font-black italic text-xl uppercase">Finalizar Pedido</h2>
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mt-1">Sigue los pasos a continuación</p>
            </div>

            <div class="bg-blue-500/10 border border-blue-500/30 rounded-2xl p-5 mb-6 text-center">
                <p class="text-[10px] text-blue-400 font-bold uppercase mb-3 tracking-widest">Paso 1: Realiza el Pago Móvil</p>
                <div class="space-y-1">
                    <p class="text-xs text-gray-400 uppercase">Banco: <span class="text-white font-bold">Venezuela (0102)</span></p>
                    <p class="text-xs text-gray-400 uppercase">Teléfono: <span class="text-white font-bold">04228242411</span></p>
                    <p class="text-xs text-gray-400 uppercase">Cédula: <span class="text-white font-bold">32.824.869</span></p>
                </div>
            </div>
            
            <div class="space-y-4">
                <p class="text-[10px] text-gray-500 font-bold uppercase ml-1 tracking-widest">Paso 2: Ingresa tus datos</p>
                
                <div>
                    <div class="flex gap-2">
                        <input type="number" id="id-jugador" placeholder="ID DEL JUGADOR" class="input-field text-sm">
                        <button onclick="verificarId()" class="bg-blue-600 px-5 rounded-xl text-white"><i class="fas fa-search"></i></button>
                    </div>
                    <p id="nick-verificado" class="hidden text-green-400 text-[10px] font-bold mt-2 uppercase italic ml-1"></p>
                </div>

                <div>
                    <input type="number" id="ref-pago" placeholder="NÚMERO DE REFERENCIA (6 DÍGITOS)" class="input-field text-sm">
                </div>

                <div class="bg-black/60 p-4 rounded-2xl border border-white/5 space-y-1">
                    <div class="flex justify-between">
                        <span id="resumen-prod" class="text-xs font-bold uppercase text-gray-400">---</span>
                        <span id="resumen-precio" class="text-sm font-black text-blue-500">0 BS</span>
                    </div>
                </div>

                <button onclick="enviarPedido()" id="btn-confirmar" class="w-full bg-green-600 py-5 rounded-2xl font-black text-sm uppercase text-white shadow-xl hover:bg-green-500 transition-all">
                    <i class="fab fa-whatsapp mr-2"></i> Confirmar por WhatsApp
                </button>
            </div>
        </div>
    </main>

    <div id="auth-modal" class="modal px-4">
        <div class="bg-[#11141b] w-full max-w-sm p-8 rounded-[2rem] border border-blue-500/30">
            <h2 class="header-font text-xl font-black text-center text-white mb-6 uppercase italic">Recargas Games</h2>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="CORREO ELECTRÓNICO" class="input-field text-xs">
                <input type="password" id="auth-password" placeholder="CONTRASEÑA" class="input-field text-xs">
                <div class="grid grid-cols-2 gap-3 mt-2">
                    <button onclick="ejecutarAuth('login')" class="btn-action py-4 rounded-xl font-bold text-[10px] uppercase">Entrar</button>
                    <button onclick="ejecutarAuth('signup')" class="bg-white text-black py-4 rounded-xl font-bold text-[10px] uppercase">Registrarse</button>
                </div>
                <button onclick="toggleAuthModal()" class="w-full text-gray-600 text-[10px] font-bold mt-2 uppercase text-center">Cerrar Ventana</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://devlbrdvcdgsrtcjubvh.supabase.co";
        const SB_KEY = "sb_publishable_NxCsDhxVElq2S0TJjt5x7Q_Tq0FIbiZ";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        const config = {
            tasa: 650,
            productos: {
                "Free Fire": [
                    { n: "110 DIAMANTES 💎", u: 0.97 },
                    { n: "220 DIAMANTES 💎", u: 1.96 },
                    { n: "341 DIAMANTES 💎", u: 3.20 },
                    { n: "572 DIAMANTES 💎", u: 4.89 },
                    { n: "1166 DIAMANTES 💎", u: 9.00 },
                    { n: "2398 DIAMANTES 💎", u: 19.00 },
                    { n: "6160 DIAMANTES 💎", u: 48.00 },
                    { n: "PASE BOOYAH 🎟️", u: 3.50 },
                    { n: "TARJETA SEMANAL 📅", u: 2.50 },
                    { n: "TARJETA MENSUAL 🌙", u: 9.50 }
                ],
                "Block Strike": [
                    { n: "100 GOLD 🥇", u: 1.50 },
                    { n: "1000 GOLD 🥇", u: 9.50 }
                ],
                "Roblox": [{ n: "400 ROBUX 🛠️", u: 4.99 }, { n: "800 ROBUX 🛠️", u: 9.99 }],
                "Netflix": [{ n: "PANTALLA 1 MES 📺", u: 3.00 }, { n: "CUENTA COMPLETA 📺", u: 10.00 }]
            }
        };

        let prodSeleccionado = null;
        let nickActual = "";

        function toggleAuthModal() { document.getElementById('auth-modal').classList.toggle('active'); }

        async function ejecutarAuth(tipo) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return alert("Completa los campos");
            const { error } = (tipo === 'signup') ? await sb.auth.signUp({email, password}) : await sb.auth.signInWithPassword({email, password});
            if(error) alert(error.message); else location.reload();
        }

        async function verificarId() {
            const id = document.getElementById('id-jugador').value;
            if(!id) return alert("Ingresa un ID");
            document.getElementById('nick-verificado').innerText = "Buscando...";
            document.getElementById('nick-verificado').classList.remove('hidden');
            
            try {
                const res = await fetch(`https://freefireapi.com.br/api/search_id?id=${id}&region=US`);
                const data = await res.json();
                if(data.nickname) {
                    nickActual = data.nickname;
                    document.getElementById('nick-verificado').innerText = "NICK: " + nickActual;
                } else {
                    document.getElementById('nick-verificado').innerText = "NICK NO ENCONTRADO";
                }
            } catch { document.getElementById('nick-verificado').innerText = "ERROR AL BUSCAR"; }
        }

        function cambiarCategoria(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active', 'text-white'); b.classList.add('text-gray-600'); });
            btn.classList.add('active', 'text-white');
            const container = document.getElementById('grid-productos');
            container.innerHTML = (config.productos[cat] || []).map(item => `
                <div class="game-card p-6 rounded-[2rem] flex justify-between items-center">
                    <div>
                        <h4 class="font-black text-lg header-font italic uppercase text-white">${item.n}</h4>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-blue-500 font-bold">$${item.u}</span>
                            <span class="text-[10px] text-gray-500 font-bold">| ${(item.u * config.tasa).toLocaleString()} BS</span>
                        </div>
                    </div>
                    <button onclick="seleccionar('${item.n}', ${item.u * config.tasa})" class="btn-action px-6 py-3 rounded-xl font-black text-[10px]">Elegir</button>
                </div>
            `).join('');
            document.getElementById('seccion-pago').style.display = 'none';
        }

        function seleccionar(nombre, precioBs) {
            prodSeleccionado = { nombre, precioBs };
            document.getElementById('resumen-prod').innerText = nombre;
            document.getElementById('resumen-precio').innerText = precioBs.toLocaleString() + " BS";
            const sec = document.getElementById('seccion-pago');
            sec.style.display = 'block';
            sec.scrollIntoView({ behavior: 'smooth' });
        }

        async function enviarPedido() {
            const { data: { user } } = await sb.auth.getUser();
            if(!user) return toggleAuthModal();
            
            const id = document.getElementById('id-jugador').value;
            const ref = document.getElementById('ref-pago').value;
            const btn = document.getElementById('btn-confirmar');
            
            if(!id || !ref) return alert("Ingresa el ID y la Referencia del pago");

            btn.disabled = true;
            btn.innerText = "PROCESANDO...";

            // Guardamos los datos omitiendo la columna 'email' para evitar el error de caché
            const { error } = await sb.from('pedidos').insert([
                {
                    producto: prodSeleccionado.nombre,
                    monto: prodSeleccionado.precioBs,
                    id_jugador: id,
                    nick: nickActual || 'No verificado',
                    referencia: ref
                }
            ]);

            // Si hay un error al guardar, igual mostramos la alerta pero permitimos continuar a WhatsApp
            if (error) {
                console.error("Error en Supabase:", error.message);
            }

            const msg = `*RECARGAS GAMES - NUEVO PEDIDO*%0A%0A` +
                        `💎 *Producto:* ${prodSeleccionado.nombre}%0A` +
                        `💰 *Monto:* ${prodSeleccionado.precioBs.toLocaleString()} BS%0A` +
                        `🆔 *ID:* ${id}%0A` +
                        `👤 *Nick:* ${nickActual || 'No verificado'}%0A` +
                        `🧾 *Ref:* ${ref}%0A` +
                        `📧 *Email:* ${user.email}`;
            
            window.location.href = `https://wa.me/584228242411?text=${msg}`;
        }

        window.onload = () => {
            sb.auth.getUser().then(({data}) => {
                if(data.user) document.getElementById('user-area').innerHTML = `<div class="bg-blue-500/10 border border-blue-500/20 px-3 py-1 rounded-full"><span class="text-[10px] font-black text-blue-400 uppercase">${data.user.email.split('@')[0]}</span></div>`;
            });
            cambiarCategoria('Free Fire', document.querySelector('.tab-btn'));
        };
    </script>
</body>
</html>
